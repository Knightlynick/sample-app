apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-cloudbuild-prod
  template:
    metadata:
      labels:
        app: hello-cloudbuild-prod
    spec:
      containers:
      - name: hello-cloudbuild-prod
        image: us-central1-docker.pkg.dev/qwiklabs-gcp-00-b9a38d37c215/my-repository/hello-cloudbuild-prod:v2.0
        ports:
        - containerPort: 8080
